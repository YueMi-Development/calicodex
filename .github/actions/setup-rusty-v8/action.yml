name: setup-rusty-v8
description: Download and verify Codex-built rusty_v8 artifacts for Cargo builds.
inputs:
  target:
    description: Rust target triple with Codex-built V8 release artifacts.
    required: true

runs:
  using: composite
  steps:
    - name: Configure rusty_v8 artifact overrides and verify checksums
      shell: bash
      env:
        TARGET: ${{ inputs.target }}
      run: |
        set -euo pipefail

        version="$(python3 "${GITHUB_WORKSPACE}/.github/scripts/rusty_v8_bazel.py" resolved-v8-crate-version)"
        binding_dir="${RUNNER_TEMP}/rusty_v8"
        mkdir -p "${binding_dir}"

        if [[ "${TARGET}" == *windows* ]]; then
          base_url="https://github.com/denoland/rusty_v8/releases/download/v${version}"
          archive_name="rusty_v8_release_${TARGET}.lib.gz"
          archive_path="${binding_dir}/${archive_name}"

          curl -fsSL "${base_url}/${archive_name}" -o "${archive_path}"

          # Windows release assets on denoland don't have separate checksum files.
          # Use the local checksum manifest in the repo to verify.
          checksums_path="${binding_dir}/rusty_v8_release_${TARGET}.sha256"
          version_underscore="${version//./_}"
          local_checksums="${GITHUB_WORKSPACE}/third_party/v8/rusty_v8_${version_underscore}.sha256"
          if [[ -f "${local_checksums}" ]]; then
            grep "${archive_name}" "${local_checksums}" > "${checksums_path}"
          else
            echo "❌ Local checksums file not found at ${local_checksums}" >&2
            exit 1
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            (cd "${binding_dir}" && sha256sum -c "${checksums_path}")
          else
            (cd "${binding_dir}" && shasum -a 256 -c "${checksums_path}")
          fi

          echo "RUSTY_V8_ARCHIVE=${archive_path}" >> "${GITHUB_ENV}"
        else
          base_url="https://github.com/openai/codex/releases/download/rusty-v8-v${version}"
          archive_name="librusty_v8_release_${TARGET}.a.gz"
          archive_path="${binding_dir}/${archive_name}"
          binding_path="${binding_dir}/src_binding_release_${TARGET}.rs"
          checksums_path="${binding_dir}/rusty_v8_release_${TARGET}.sha256"

          curl -fsSL "${base_url}/${archive_name}" -o "${archive_path}"
          curl -fsSL "${base_url}/src_binding_release_${TARGET}.rs" -o "${binding_path}"
          curl -fsSL "${base_url}/rusty_v8_release_${TARGET}.sha256" -o "${checksums_path}"

          if [[ "$(wc -l < "${checksums_path}")" -ne 2 ]]; then
            echo "Expected exactly two checksums for ${TARGET} in ${checksums_path}" >&2
            exit 1
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            (cd "${binding_dir}" && sha256sum -c "${checksums_path}")
          else
            (cd "${binding_dir}" && shasum -a 256 -c "${checksums_path}")
          fi

          echo "RUSTY_V8_ARCHIVE=${archive_path}" >> "${GITHUB_ENV}"
          echo "RUSTY_V8_SRC_BINDING_PATH=${binding_path}" >> "${GITHUB_ENV}"
        fi
