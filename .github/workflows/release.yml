name: release

on:
  push:
    branches:
      - "v*.*.*"

permissions:
  contents: write

env:
  RUST_MIN_STACK: 8388608

jobs:
  build-and-release:
    name: Build & Release - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config libcap-dev build-essential

      - name: Install Zig (Linux cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Setup musl build tools (Linux cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        env:
          TARGET: ${{ matrix.target }}
        run: bash .github/scripts/install-musl-build-tools.sh

      - name: Configure LLVM linker (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-msvc-env
        with:
          target: ${{ matrix.target }}

      - name: Build (Windows/macOS/Linux)
        shell: bash
        working-directory: codex-rs
        run: |
          target="${{ matrix.target }}"
          if [[ "$target" == "x86_64-pc-windows-msvc" ]]; then
            export LIBSQLITE3_FLAGS=SQLITE_DISABLE_INTRINSIC
          fi
          # Build all workspace binaries
          cargo build --target "$target" --release

      - name: Package Release (Non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          target="${{ matrix.target }}"
          version="${{ github.ref_name }}"
          release_dir="codex-rs/target/${target}/release"
          dist_dir="dist/${target}"
          mkdir -p "$dist_dir"
          
          # Copy binaries to dist
          cp "$release_dir/calicodex" "$dist_dir/" || true
          cp "$release_dir/codex-app-server" "$dist_dir/" || true
          cp "$release_dir/codex-code-mode-host" "$dist_dir/" || true
          cp "$release_dir/codex-responses-api-proxy" "$dist_dir/" || true
          cp "$release_dir/bwrap" "$dist_dir/" || true
          
          # Compress to tar.gz with version in name
          tar -czf "calicodex-${version}-${target}.tar.gz" -C "$dist_dir" .

      - name: Build Windows Installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $version = "${{ github.ref_name }}"
          $stageDir = "codex-rs\target\${target}\release"
          $distDir = "dist\${target}"
          New-Item -ItemType Directory -Force -Path $distDir
          
          # Run Inno Setup Compiler with version in the output file name
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="$version" `
            /DStageDir="$stageDir" `
            /DOutputDir="$distDir" `
            /DOutputBaseFilename="calicodex-setup-$version-$target" `
            .github\scripts\calicodex.iss

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            calicodex-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            dist/${{ matrix.target }}/calicodex-setup-${{ github.ref_name }}-${{ matrix.target }}.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
